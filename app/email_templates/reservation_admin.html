<h2>Nova reserva recibida</h2>

<ul>
  <li><strong>ID:</strong> {{ reservation_id }}</li>
  <li><strong>Data:</strong> {{ date }}</li>
  <li><strong>Hora:</strong> {{ time }}</li>
  <li><strong>Persoas:</strong> {{ party_size }}</li>
</ul>

<h3>Cliente</h3>
<ul>
  <li><strong>Nome:</strong> {{ customer_name }}</li>
  <li><strong>Teléfono:</strong> {{ customer_phone or '-' }}</li>
  <li><strong>Email:</strong> {{ customer_email or '-' }}</li>
</ul>

<h3>Notas</h3>
<p>{{ notes or '-' }}</p>
